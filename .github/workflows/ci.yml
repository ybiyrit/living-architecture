name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  main:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10.28.0
          run_install: false

      # This enables task distribution via Nx Cloud
      # Run this command as early as possible, before dependencies are installed
      # Learn more at https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
      # Connect your workspace by running "nx connect" and uncomment this line to enable task distribution
      # - run: pnpm dlx nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="build"

      # Cache node_modules
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # pnpm v10 does not run better-sqlite3's install script despite onlyBuiltDependencies.
      # Manually trigger prebuild-install to download prebuilt native bindings.
      - name: Build better-sqlite3 native bindings
        run: |
          BS3_DIR=$(find node_modules/.pnpm -path "*/better-sqlite3@*/node_modules/better-sqlite3/package.json" -exec dirname {} \; | head -1)
          if [ -n "$BS3_DIR" ]; then
            cd "$BS3_DIR" && npx --yes prebuild-install || npx --yes node-gyp rebuild --release
          fi

      # Prepend any command with "nx-cloud record --" to record its logs to Nx Cloud
      # - run: pnpm exec nx-cloud record -- echo Hello World
      # PRs: test affected only (faster feedback)
      - name: Test affected (PR)
        if: github.event_name == 'pull_request'
        run: pnpm exec nx affected -t lint test build typecheck check-generated-docs smoke-test --verbose

      # Main: test everything (ensures coverage files exist for SonarCloud)
      - name: Test all (main)
        if: github.ref == 'refs/heads/main'
        run: pnpm exec nx run-many -t lint test build typecheck --verbose

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true

  browser-tests:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    concurrency:
      group: browser-${{ matrix.browser }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10.28.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ matrix.browser }}-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ matrix.browser }}-${{ runner.os }}-

      - name: Install Playwright browser with dependencies
        run: pnpm --filter @living-architecture/eclair exec playwright install --with-deps ${{ matrix.browser }}

      - name: Browser tests (PR)
        if: github.event_name == 'pull_request'
        run: BROWSER=${{ matrix.browser }} pnpm exec nx affected -t test:browser --verbose

      - name: Browser tests (main)
        if: github.ref == 'refs/heads/main'
        run: BROWSER=${{ matrix.browser }} pnpm exec nx run-many -t test:browser --verbose

  knip:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Check for dead code
        run: pnpm knip

  lint-markdown:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Check markdown formatting
        run: pnpm lint:md

  shellcheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck

      - name: Run ShellCheck
        run: |
          shopt -s nullglob
          script_files=(scripts/*.sh)
          status=0
          if ((${#script_files[@]})); then
            shellcheck "${script_files[@]}" || status=$?
          fi
          shellcheck --shell=sh .husky/commit-msg .husky/pre-commit || status=$?
          exit "$status"

  publish:
    needs: [main]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    concurrency:
      group: publish-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync with remote
        run: git pull --rebase origin main

      - name: Release
        run: pnpm exec nx release --yes
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          HUSKY: 0
